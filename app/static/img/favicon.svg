<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="SpotCheck">
  <!-- Lensa SpotCheck: menyalin logo .brand .lens dari style.css (lingkaran
       bergaris --primary, isian --mint, titik tengah --primary-2, gagang 45
       derajat di kanan bawah). Garisnya sengaja lebih tebal daripada versi CSS:
       border 2px pada lensa 34px akan lenyap saat ikon dikecilkan ke 16px. -->
  <circle cx="13" cy="13" r="9.6" fill="#E6F2EE" stroke="#14584C" stroke-width="3"/>
  <circle cx="13" cy="13" r="3.1" fill="#2E8B7F"/>
  <line x1="20.6" y1="20.6" x2="28.4" y2="28.4"
        stroke="#14584C" stroke-width="4" stroke-linecap="round"/>
</svg>
