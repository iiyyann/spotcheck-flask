<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{% block title %}SpotCheck — Eczema vs Tinea Classifier{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand" onclick="go('home')">
      <span class="lens"><span class="dot"></span></span>
      <b>Spot<span>Check</span></b>
    </div>
    <button class="menu-toggle" onclick="document.querySelector('nav.menu').classList.toggle('open')"><span></span></button>
    <nav class="menu">
      <button data-nav="home" class="active" onclick="go('home')">Home &amp; Scan</button>
      <button data-nav="eczema" onclick="go('eczema')">Eczema</button>
      <button data-nav="tinea" onclick="go('tinea')">Tinea</button>
      <button data-nav="about" onclick="go('about')">About Model</button>
    </nav>
  </div>
</header>

<main>
{% block content %}{% endblock %}
</main>

<footer>
  <div class="foot-inner">
    <div><b style="font-family:'Fraunces',serif;color:var(--ink);">SpotCheck</b> · Educational skin-condition classifier</div>
    <div>Not a medical diagnosis · Education adapted from Cleveland Clinic</div>
  </div>
</footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
